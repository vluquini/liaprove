# =========================================================
# APPLICATION - BASE CONFIG (COMMON TO ALL PROFILES)
# =========================================================

# --- Application Name ---
spring.application.name=liaprove

# --- JPA (common behavior) ---
spring.jpa.open-in-view=false

# Logging base
logging.level.root=INFO

# =========================================================
# AI PRE-ANALYSIS (SPRING AI + OPENAI COMPATIBLE)
# =========================================================
app.ai.pre-analysis.enabled=true

# Model via OpenRouter
spring.ai.openai.chat.options.model=qwen/qwen3-vl-30b-a3b-thinking
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.api-key=${AI_API_KEY:}
