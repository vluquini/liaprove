# =========================================================
# APPLICATION - BASE CONFIG (COMMON TO ALL PROFILES)
# =========================================================

# --- Application Name ---
spring.application.name=liaprove

# --- JPA (common behavior) ---
spring.jpa.open-in-view=false

# Logging base
logging.level.root=INFO

# --- AI Pre-analysis (HTTP client, no Spring AI) ---
ai.http.base-url=${AI_HTTP_BASE_URL:https://openrouter.ai/api/v1}
ai.http.chat-completions-path=${AI_HTTP_CHAT_COMPLETIONS_PATH:/chat/completions}
ai.http.api-key=${AI_API_KEY:}
ai.http.model=${AI_MODEL:qwen/qwen3-vl-30b-a3b-thinking}
ai.http.connect-timeout-ms=${AI_CONNECT_TIMEOUT_MS:5000}
ai.http.read-timeout-ms=${AI_READ_TIMEOUT_MS:20000}
ai.http.referer=${AI_HTTP_REFERER:localhost}
ai.http.title=${AI_HTTP_TITLE:liaprove}

