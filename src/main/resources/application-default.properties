# =========================================================
# PROFILE: DEFAULT
#
# PURPOSE:
# - Default local execution environment
# - Same behavior expected for future PROD
# - Connects to PostgreSQL using Docker
# - Executes seed data for manual and automated tests
#
# IMPORTANT:
# - The configs below MUST be moved in the future
#   to the 'prod' profile, with proper adjustments
#   (host, credentials, security, seed, etc.)
# =========================================================

# ---------------------------------------------------------
# DATASOURCE - PostgreSQL (Local Docker)
# ---------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/liaprove_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------
# JPA / HIBERNATE
# ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Required to ensure JPA schema exists before running seed scripts
spring.jpa.defer-datasource-initialization=true

# ---------------------------------------------------------
# SQL INITIALIZATION (SEED DATA)
# ---------------------------------------------------------
# WARNING:
# - Enabled only while there is no real PROD environment
# - Will be disabled in the 'prod' profile
spring.sql.init.mode=always
spring.sql.init.data-locations=\
classpath:db/postgres-populate-users.sql,\
classpath:db/postgres-populate-questions.sql

# ---------------------------------------------------------
# SECURITY / JWT
# ---------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ---------------------------------------------------------
# GENETIC ALGORITHM (GA)
# ---------------------------------------------------------
# Runs the genetic vote weight scheduler every 5 minutes.
ga.scheduler.cron=0 */5 * * * *
ga.metrics.recent-window-days=30

# ---------------------------------------------------------
# APPROVED QUESTION PUBLICATION
# ---------------------------------------------------------
# Runs the APPROVED -> FINISHED scheduler every 5 minutes.
question.publication.scheduler.fixed-rate-ms=300000
# PT0S enables the demo flow: APPROVED questions are published without checking votingEndDate.
question.publication.delay=PT0S

# ---------------------------------------------------------
# QUESTION VOTING EVALUATION
# ---------------------------------------------------------
# Runs the VOTING -> APPROVED/REJECTED scheduler every 1 minute.
question.voting.evaluator.scheduler.fixed-rate-ms=60000
