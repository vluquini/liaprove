# =========================================================
# E2E PROFILE - REAL AUTH WITH EPHEMERAL H2 DATABASE
# =========================================================

server.port=8080

spring.datasource.url=jdbc:h2:mem:liaprove_e2e;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.sql.init.mode=never

jwt.secret=liaprove-e2e-secret-key-with-enough-length-for-authentication-tests
jwt.expiration=3600000

# Runs the genetic vote weight scheduler every 5 minutes.
ga.scheduler.cron=0 */5 * * * *
ga.metrics.recent-window-days=30

logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
