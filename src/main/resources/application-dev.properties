# =========================================================
# PROFILE: DEV
#
# PURPOSE:
# - Fast development
# - Debug
# - Isolated tests
# - Does not represent PROD
# =========================================================

# ---------------------------------------------------------
# SECURITY (DEV ONLY)
# ---------------------------------------------------------
security.dev.fixed-token=dev-token

# ---------------------------------------------------------
# DATASOURCE - H2 (In-Memory)
# ---------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/h2/liaprovedb;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---------------------------------------------------------
# JPA / HIBERNATE
# ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# ---------------------------------------------------------
# SQL INITIALIZATION (DEV SEED)
# ---------------------------------------------------------
spring.sql.init.mode=always
spring.sql.init.data-locations=\
classpath:db/h2-populate-users.sql,\
classpath:db/h2-populate-questions.sql

# ---------------------------------------------------------
# H2 CONSOLE
# ---------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------
# DEBUG / OBSERVABILITY
# ---------------------------------------------------------
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# ---------------------------------------------------------
# GENETIC ALGORITHM (GA)
# ---------------------------------------------------------
# Runs the genetic vote weight scheduler every 5 minutes.
ga.scheduler.cron=0 */5 * * * *
ga.metrics.recent-window-days=30

# ---------------------------------------------------------
# APPROVED QUESTION PUBLICATION
# ---------------------------------------------------------
# Runs the APPROVED -> FINISHED scheduler every 5 minutes.
question.publication.scheduler.fixed-rate-ms=300000
# PT0S enables the demo flow: APPROVED questions are published without checking votingEndDate.
question.publication.delay=PT0S

# ---------------------------------------------------------
# QUESTION VOTING EVALUATION
# ---------------------------------------------------------
# Runs the VOTING -> APPROVED/REJECTED scheduler every 1 minute.
question.voting.evaluator.scheduler.fixed-rate-ms=60000
