services:
  postgres:
    image: postgres:18-alpine
    container_name: liaprove_postgres
    environment:
      POSTGRES_DB: liaprove_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d liaprove_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
